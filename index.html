<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>תורת הרי"ף</title>
    <style>
        body { background-color: #2c2420; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; font-family: 'David Libre', serif; overflow: hidden; }
        .header-top { margin-top: 10px; font-size: 3rem; font-weight: 900; color: #d4af37; font-family: 'Frank Ruhl Libre', serif; }
        .frame { width: 95vw; height: 78vh; border: 20px solid #4a3728; border-style: ridge; background: #e3dac9; display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px; padding: 15px; box-sizing: border-box; }
        .side-panel { background: rgba(255, 255, 255, 0.3); border: 2px solid #8b7355; border-radius: 10px; padding: 8px; overflow-y: auto; }
        .title { font-size: 0.9rem; color: #4a3728; border-bottom: 2px solid #4a3728; text-align: center; margin-bottom: 5px; font-weight: bold; }
        .row { display: flex; justify-content: space-between; font-size: 0.75rem; margin: 1px 0; font-weight: bold; }
        .center-piece { background: #fff; border: 4px solid #b8860b; border-radius: 50px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 10px; }
        #clock { font-size: 3rem; font-weight: bold; color: #000; margin: 5px 0; }
        #parasha { font-size: 1.5rem; font-weight: 900; color: #4a3728; }
        .info-text { font-size: 1rem; color: #444; font-weight: bold; margin-top: 5px; }
        .shabbat-box { margin-top: 10px; font-size: 1rem; color: #8b4513; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-top">תורת הרי"ף</div>

<div class="frame">
    <div class="side-panel">
        <div class="title">זמני תפילות</div>
        <div class="row"><span>שחרית</span><span>06:00/08:00</span></div>
        <div class="row"><span>מנחה</span><span>17:00</span></div>
        <div class="row"><span>ערבית</span><span>20:15</span></div>
    </div>

    <div class="center-piece">
        <div id="hebrew-date" style="font-size: 0.8rem;">---</div>
        <div id="clock">00:00:00</div>
        <div id="parasha">---</div>
        <div id="haftarah" class="info-text">---</div>
        <div id="shabbat-times" class="shabbat-box">---</div>
    </div>

    <div id="zmanim" class="side-panel">
        <div class="title">זמני היום</div>
        <!-- Zmanim will be injected here -->
    </div>
</div>

<script>
    async function loadData() {
        // Реховот (GeoID: 293842)
        const res = await fetch('https://www.hebcal.com/shabbat?cfg=json&geonameid=293842&m=50');
        const data = await res.json();
        
        document.getElementById('parasha').innerText = data.items.find(i => i.category === 'parashat').hebrew;
        document.getElementById('haftarah').innerText = data.items.find(i => i.category === 'haftarah')?.hebrew || '';
        
        const shabbat = data.items.filter(i => i.category === 'candles' || i.category === 'havdalah');
        document.getElementById('shabbat-times').innerHTML = `כניסת השבת: ${shabbat[0]?.title.split(' ')[2]} | צאת השבת: ${shabbat[1]?.title.split(' ')[2]}`;

        const zmanimList = data.times;
        const zmanimDiv = document.getElementById('zmanim');
        for (const [key, value] of Object.entries(zmanimList)) {
            const time = new Date(value).toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
            zmanimDiv.innerHTML += `<div class="row"><span>${key}</span><span>${time}</span></div>`;
        }
    }

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('he-IL', { hour12: false });
    }
    
    setInterval(updateClock, 1000);
    updateClock();
    loadData();
</script>
</body>
</html>
