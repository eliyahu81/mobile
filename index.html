<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תורת הרי"ף</title>
    <style>
        body { background-color: #2c2420; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        .main { width: 95vw; height: 85vh; background: #e3dac9; border: 15px ridge #4a3728; display: grid; grid-template-columns: 1fr 2fr 1fr; padding: 10px; gap: 10px; box-sizing: border-box; }
        .panel { background: rgba(255, 255, 255, 0.6); border: 2px solid #8b4513; padding: 10px; font-weight: bold; font-size: 0.9rem; border-radius: 10px; text-align: right; direction: rtl; }
        .center { background: white; border: 3px solid #b8860b; border-radius: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #clock { font-size: 2.5rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="main">
        <div class="panel" id="left-col">זמני תפילות<hr></div>
        <div class="center">
            <div id="clock">00:00:00</div>
            <div id="parasha" style="font-weight:bold; margin-top:10px;"></div>
        </div>
        <div class="panel" id="right-col">זמני היום<hr></div>
    </div>
    <script>
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('he-IL', { hour12: false });
        }, 1000);
        
        fetch('https://www.hebcal.com/shabbat?cfg=json&geonameid=293842&m=50')
            .then(r => r.json())
            .then(d => {
                const p = d.items.find(i => i.category === 'parashat');
                if (p) document.getElementById('parasha').innerText = p.hebrew;
                
                const left = document.getElementById('left-col');
                const right = document.getElementById('right-col');
                
                d.items.forEach(i => {
                    if (i.category === 'candles') left.innerHTML += `<div style="margin-top:5px;">הדלקת נרות: ${i.title.split(' ')[2]}</div>`;
                    if (i.category === 'havdalah') right.innerHTML += `<div style="margin-top:5px;">הבדלה: ${i.title.split(' ')[2]}</div>`;
                });
            });
    </script>
</body>
</html>
