<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תורת הרי"ף</title>
    <style>
        body { background-color: #2c2420; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .main { width: 95vw; height: 80vh; background: #e3dac9; border: 15px ridge #4a3728; display: grid; grid-template-columns: 1fr 2fr 1fr; padding: 10px; gap: 10px; }
        .block { background: rgba(0,0,0,0.1); padding: 10px; text-align: center; font-weight: bold; }
        .center { background: white; border-radius: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="main">
        <div class="block">זמני תפילות</div>
        <div class="block center">
            <div id="clock" style="font-size: 2rem;">00:00:00</div>
            <div id="parasha">טוען...</div>
        </div>
        <div class="block">זמני היום</div>
    </div>
    <script>
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('he-IL', { hour12: false });
        }, 1000);
        fetch('https://www.hebcal.com/shabbat?cfg=json&geonameid=293842&m=50')
            .then(r => r.json())
            .then(d => {
                const p = d.items.find(i => i.category === 'parashat');
                document.getElementById('parasha').innerText = p ? p.hebrew : "";
            });
    </script>
</body>
</html>
