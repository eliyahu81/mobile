<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>תורת הרי"ף</title>
    <style>
        body { background-color: #2c2420; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; font-family: 'David Libre', serif; overflow: hidden; }
        .header-top { margin-top: 10px; font-size: 3rem; font-weight: 900; color: #d4af37; font-family: 'Frank Ruhl Libre', serif; }
        .frame { width: 95vw; height: 75vh; border: 20px solid #4a3728; border-style: ridge; background: #e3dac9; display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px; padding: 15px; box-sizing: border-box; }
        
        .side-panel { background: rgba(255, 255, 255, 0.3); border: 2px solid #8b7355; border-radius: 10px; padding: 8px; }
        .title { font-size: 1rem; color: #4a3728; border-bottom: 2px solid #4a3728; text-align: center; margin-bottom: 5px; font-weight: bold; }
        .row { display: flex; justify-content: space-between; font-size: 0.8rem; margin: 1px 0; font-weight: bold; }
        
        .center-piece { background: #fff; border: 4px solid #b8860b; border-radius: 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 10px; }
        #clock { font-size: 3rem; font-weight: bold; color: #000; margin: 5px 0; }
        #parasha { font-size: 1.5rem; font-weight: 900; color: #4a3728; }
        .info-text { font-size: 1rem; color: #444; font-weight: bold; margin-top: 5px; }
        .shabbat-box { margin-top: 10px; font-size: 1.1rem; color: #8b4513; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-top">תורת הרי"ף</div>

<div class="frame">
    <!-- Зманей а-йом -->
    <div class="side-panel">
        <div class="title">זמני היום</div>
        <div class="row"><span>נץ החמה</span><span>05:42</span></div>
        <div class="row"><span>שקיעה</span><span>19:51</span></div>
        <div class="row"><span>צאת הכוכבים</span><span>20:13</span></div>
        <div class="row"><span>צאת ר"ת</span><span>21:04</span></div>
    </div>

    <!-- Центр -->
    <div class="center-piece">
        <div id="clock">00:00:00</div>
        <div id="parasha">פרשת מטות-מסעי</div>
        <div class="info-text">הפטרת השבת: ירמיה פרק ב'</div>
        <div class="shabbat-box">
            כניסת השבת: 19:30 | צאת השבת: 20:31
        </div>
    </div>

    <!-- Левая панель: Зманей тфилот -->
    <div class="side-panel">
        <div class="title">זמני תפילות חול</div>
        <div class="row"><span>שחרית</span><span>06:00</span></div>
        <div class="row"><span>מנחה</span><span>17:00</span></div>
        <div class="row"><span>ערבית</span><span>20:15</span></div>

        <div style="margin-top: 15px;"></div>

        <div class="title">זמני תפילות שבת</div>
        <div class="row"><span>שחרית</span><span>08:00</span></div>
        <div class="row"><span>מנחה</span><span>17:00</span></div>
        <div class="row"><span>ערבית</span><span>20:15</span></div>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('he-IL', { hour12: false });
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>
</body>
</html>
