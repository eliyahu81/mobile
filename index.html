<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>תורת הרי"ף</title>
    <style>
        body { background-color: #2c2420; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'David Libre', serif; overflow: hidden; }
        .header { color: #d4af37; font-size: 2rem; font-weight: 900; margin-bottom: 5px; }
        .frame { width: 95vw; height: 85vh; border: 15px solid #4a3728; border-style: ridge; background: #e3dac9; display: grid; grid-template-columns: 1fr 2.5fr 1fr; padding: 10px; box-sizing: border-box; gap: 10px; }
        .panel { background: rgba(255, 255, 255, 0.4); padding: 5px; font-size: 0.65rem; font-weight: bold; }
        .center { background: #fff; border: 3px solid #b8860b; border-radius: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #clock { font-size: 2.5rem; font-weight: bold; color: #000; }
    </style>
</head>
<body>

<div class="header">תורת הרי"ף</div>

<div class="frame">
    <div class="panel">
        <div style="text-align:center; border-bottom:1px solid #4a3728; margin-bottom:5px;">זמני תפילות</div>
        <div>שחרית: 06:00/08:00</div>
        <div>מנחה: 17:00</div>
        <div>ערבית: 20:15</div>
    </div>
    
    <div class="center">
        <div id="clock">00:00:00</div>
        <div style="font-size: 1.2rem; font-weight: 900;">פרשת מטות-מסעי</div>
        <div style="font-size: 0.8rem; margin-top: 5px;">כניסת השבת: 19:28<br>צאת השבת: 20:31</div>
    </div>

    <div class="panel">
        <div style="text-align:center; border-bottom:1px solid #4a3728; margin-bottom:5px;">זמני היום</div>
        <div>נץ החמה: 05:42</div>
        <div>שקיעה: 19:51</div>
        <div>צאת הכוכבים: 20:13</div>
    </div>
</div>

<script>
    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('he-IL', { hour12: false });
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>
</body>
</html>
