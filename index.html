<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #2c2420; color: #f4e4bc; font-family: sans-serif; display: flex; justify-content: space-around; padding: 20px; }
        .column { width: 30%; border: 1px solid #d4af37; padding: 10px; text-align: center; }
        h2 { color: #d4af37; border-bottom: 1px solid #d4af37; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="column">
    <h2>זמני היום</h2>
    <div id="zmanim-list">טוען...</div>
</div>
<div class="column">
    <h2>שעה</h2>
    <div id="clock"></div>
</div>
<div class="column">
    <h2>פרשת שבוע</h2>
    <div id="parasha">טוען...</div>
</div>

<script>
    // Вставь сюда URL, который ты получил от Google Apps Script
    const myProxyUrl = 'ТВОЯ_ССЫЛКА_ОТ_GOOGLE_APPS_SCRIPT';

    fetch(myProxyUrl)
    .then(r => r.json())
    .then(data => {
        const z = data.times;
        document.getElementById('zmanim-list').innerHTML = 
            `נץ: ${new Date(z.sunrise).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'})}<br>` +
            `שקיעה: ${new Date(z.sunset).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'})}`;
    })
    .catch(err => document.getElementById('zmanim-list').innerText = "שגיאה בטעינה");

    setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('he-IL'), 1000);
</script>

</body>
</html>
