<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>לוח זמני בית הכנסת</title>
    <style>
        body { font-family: sans-serif; background-color: #2c2420; color: #f4e4bc; margin: 0; padding: 10px; }
        .container { display: flex; justify-content: space-between; gap: 10px; height: 90vh; }
        .column { width: 30%; border: 2px solid #d4af37; padding: 15px; border-radius: 8px; background: #3e352e; overflow-y: auto; }
        .center-column { width: 35%; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        h2 { border-bottom: 2px solid #d4af37; padding-bottom: 10px; color: #d4af37; }
        .time-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #5a4f45; }
        #clock { font-size: 2em; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="column" id="zmanim-left">
        <h2>זמני היום</h2>
        <div id="zmanim-list">טוען נתונים...</div>
    </div>
    <div class="column center-column">
        <div id="clock">טוען זמן...</div>
        <div id="parasha">טוען פרשת שבוע...</div>
    </div>
    <div class="column">
        <h2>זמני תפילה</h2>
        <div>יתפרסם בהמשך...</div>
    </div>
</div>

<script>
    // שעון ופרשה
    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('he-IL');
    }
    setInterval(updateClock, 1000);

    // משיכת זמנים
    const apiUrl = 'https://www.hebcal.com/zmanim?cfg=json&city=israel-tel-aviv&maj=on';
    fetch(apiUrl)
        .then(response => response.json())
        .then(data => {
            const z = data.times;
            const timesList = [
                {n: "נץ החמה", v: z.sunrise},
                {n: "שקיעה", v: z.sunset},
                {n: "צאת הכוכבים", v: z.tzait}
            ];
            let html = '';
            timesList.forEach(t => {
                let timeStr = new Date(t.v).toLocaleTimeString('he-IL', {hour: '2-digit', minute: '2-digit'});
                html += `<div class="time-row"><span>${t.n}</span><span>${timeStr}</span></div>`;
            });
            document.getElementById('zmanim-list').innerHTML = html;
        });

    // פרשת שבוע
    fetch('https://www.hebcal.com/hebcal?v=1&cfg=json&maj=on&year=now&month=x')
        .then(response => response.json())
        .then(data => {
            const parasha = data.items.find(i => i.category === 'parashat');
            document.getElementById('parasha').innerText = parasha ? parasha.title : 'אין פרשה השבוע';
        });
</script>
</body>
</html>
