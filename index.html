<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>תורת הרי"ף</title>
    <style>
        body { background-color: #2c2420; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-family: 'David Libre', serif; }
        .header-top { margin: 10px 0; font-size: 2.5rem; font-weight: 900; color: #d4af37; font-family: 'Frank Ruhl Libre', serif; }
        .frame { width: 95vw; border: 15px solid #4a3728; border-style: ridge; background: #e3dac9; display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 5px; padding: 10px; box-sizing: border-box; }
        .side-panel { background: rgba(255, 255, 255, 0.3); border: 2px solid #8b7355; padding: 5px; font-size: 0.7rem; }
        .title { font-size: 0.8rem; color: #4a3728; border-bottom: 2px solid #4a3728; text-align: center; margin-bottom: 5px; font-weight: bold; }
        .row { display: flex; justify-content: space-between; margin: 2px 0; font-weight: bold; }
        .center-piece { background: #fff; border: 3px solid #b8860b; border-radius: 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; text-align: center; }
        #clock { font-size: 2rem; font-weight: bold; color: #000; }
        #parasha { font-size: 1.2rem; font-weight: 900; color: #4a3728; margin: 5px 0; }
        #shabbat-times { font-size: 0.9rem; color: #8b4513; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header-top">תורת הרי"ף</div>

<div class="frame">
    <div class="side-panel">
        <div class="title">זמני תפילות</div>
        <div class="row"><span>שחרית</span><span>06:00/08:00</span></div>
        <div class="row"><span>מנחה</span><span>17:00</span></div>
        <div class="row"><span>ערבית</span><span>20:15</span></div>
    </div>

    <div class="center-piece">
        <div id="clock">00:00:00</div>
        <div id="parasha">טוען נתונים...</div>
        <div id="shabbat-times"></div>
    </div>

    <div id="zmanim" class="side-panel">
        <div class="title">זמני היום</div>
    </div>
</div>

<script>
    async function loadData() {
        try {
            const response = await fetch('https://www.hebcal.com/shabbat?cfg=json&geonameid=293842&m=50');
            const data = await response.json();
            
            // Заголовок параши
            const parashaItem = data.items.find(i => i.category === 'parashat');
            document.getElementById('parasha').innerText = parashaItem ? parashaItem.hebrew : "";
            
            // Время шаббата
            const candles = data.items.find(i => i.category === 'candles');
            const havdalah = data.items.find(i => i.category === 'havdalah');
            document.getElementById('shabbat-times').innerHTML = 
                `כניסת השבת: ${candles ? candles.title.split(' ')[2] : ''}<br>` +
                `צאת השבת: ${havdalah ? havdalah.title.split(' ')[2] : ''}`;

            // Зманим
            const zmanimDiv = document.getElementById('zmanim');
            for (const [key, value] of Object.entries(data.times)) {
                const time = new Date(value).toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
                zmanimDiv.innerHTML += `<div class="row"><span>${key}</span><span>${time}</span></div>`;
            }
        } catch (e) { document.getElementById('parasha').innerText = "שגיאה בטעינה"; }
    }

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('he-IL', { hour12: false });
    }
    
    setInterval(updateClock, 1000);
    updateClock();
    loadData();
</script>
</body>
</html>
