<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .column { width: 80%; text-align: center; }
        h2 { color: #d4af37; border-bottom: 1px solid #d4af37; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="column">
    <h2>זמני היום</h2>
    <div id="zmanim-list">טוען נתונים...</div>
</div>

<script>
    // Читаем локальный файл data.json, который мы создали через Actions
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            const z = data.times;
            const sunrise = new Date(z.sunrise).toLocaleTimeString('he-IL', {hour: '2-digit', minute: '2-digit'});
            const sunset = new Date(z.sunset).toLocaleTimeString('he-IL', {hour: '2-digit', minute: '2-digit'});
            
            document.getElementById('zmanim-list').innerHTML = 
                `זריחה: ${sunrise}<br>שקיעה: ${sunset}`;
        })
        .catch(err => {
            document.getElementById('zmanim-list').innerText = "שגיאה בטעינת הנתונים";
        });
</script>

</body>
</html>
