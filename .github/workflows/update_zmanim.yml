name: Update Zmanim
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Generate Zmanim
        run: |
          node -e '
            const date = new Date();
            const data = {
              times: {
                sunrise: new Date(date.setHours(5, 30)).toISOString(),
                sunset: new Date(date.setHours(19, 45)).toISOString()
              }
            };
            require("fs").writeFileSync("data.json", JSON.stringify(data, null, 2));
          '
      - name: Commit and Push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add data.json
          git commit -m "Update Zmanim data"
          git push
