name: Update Zmanim
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install kosher-zmanim
      - name: Generate Zmanim
        run: |
          node -e '
            const { GeoLocation, Zmanim } = require("kosher-zmanim");
            const location = new GeoLocation("Rehovot", 31.89, 34.81, 0, "Asia/Jerusalem");
            const zmanim = new Zmanim(location, new Date());
            const data = {
              times: {
                alos90: zmanim.getAlos90().toISOString(),
                alos72: zmanim.getAlos72().toISOString(),
                talisTefillin: zmanim.getTalisTefillin().toISOString(),
                sunrise: zmanim.getSunrise().toISOString(),
                sofZmanShmaMGA: zmanim.getSofZmanShmaMGA().toISOString(),
                sofZmanShmaGRA: zmanim.getSofZmanShmaGRA().toISOString(),
                sofZmanTfilaMGA: zmanim.getSofZmanTfilaMGA().toISOString(),
                sofZmanTfilaGRA: zmanim.getSofZmanTfilaGRA().toISOString(),
                chatzos: zmanim.getChatzos().toISOString(),
                minchaGedola: zmanim.getMinchaGedola().toISOString(),
                minchaKetana: zmanim.getMinchaKetana().toISOString(),
                plagMincha: zmanim.getPlagMincha().toISOString(),
                sunset: zmanim.getSunset().toISOString(),
                tzais: zmanim.getTzais().toISOString(),
                tzaisRabbeinuTam: zmanim.getTzaisRabbeinuTam().toISOString()
              }
            };
            require("fs").writeFileSync("data.json", JSON.stringify(data, null, 2));
          '
      - name: Commit and Push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add data.json
          git commit -m "Update full Zmanim"
          git push
