name: Update Zmanim
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Generate Zmanim
        run: |
          node -e '
            const date = new Date();
            const data = {
              times: {
                alos90: new Date(date.setHours(4, 30)).toISOString(),
                sunrise: new Date(date.setHours(5, 50)).toISOString(),
                sofZmanShmaGRA: new Date(date.setHours(9, 30)).toISOString(),
                sofZmanTfilaGRA: new Date(date.setHours(10, 30)).toISOString(),
                chatzos: new Date(date.setHours(12, 50)).toISOString(),
                minchaGedola: new Date(date.setHours(13, 20)).toISOString(),
                minchaKetana: new Date(date.setHours(16, 50)).toISOString(),
                plagMincha: new Date(date.setHours(18, 20)).toISOString(),
                sunset: new Date(date.setHours(19, 50)).toISOString(),
                tzais: new Date(date.setHours(20, 15)).toISOString()
              }
            };
            require("fs").writeFileSync("data.json", JSON.stringify(data, null, 2));
          '
      - name: Commit and Push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add data.json
          git commit -m "Update Zmanim data"
          git push
