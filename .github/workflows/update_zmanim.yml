name: Update Zmanim
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install kosher-zmanim
      - name: Generate Zmanim
        run: |
          node -e '
            const { GeoLocation, Zmanim } = require("kosher-zmanim");
            const location = new GeoLocation("Ness Ziona", 31.92, 34.79, 0, "Asia/Jerusalem");
            const zmanim = new Zmanim(location, new Date());
            const data = {
              times: {
                sunrise: zmanim.getSunrise().toISOString(),
                sunset: zmanim.getSunset().toISOString()
              }
            };
            require("fs").writeFileSync("data.json", JSON.stringify(data, null, 2));
          '
      - name: Commit and Push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add data.json
          git commit -m "Update Zmanim data"
          git push

